{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">API Performance Analyzer</h2>

    <form method="POST" action="{{ url_for('web.analyze') }}">
        
        <!-- URL Input -->
        <div class="mb-3">
            <label for="url" class="form-label">Enter API URL</label>
            {{ form.url(class="form-control", placeholder="https://api.example.com") }}
        </div>

        <!-- Number of Requests -->
        <div class="mb-3">
            <label for="requests" class="form-label">Number of Requests</label>
            <input type="number" name="requests" class="form-control" value="10" min="1" max="100">
        </div>

        <!-- Submit Button -->
        <div class="text-center">
            <button type="submit" class="btn btn-primary">
                Analyze API
            </button>
        </div>

    </form>
</div>

{% endblock %}
